<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – SEGULAP Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link href="../assets/css/segulap.css" rel="stylesheet" type="text/css">
<style>
.admin-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-bottom: 2px solid var(--border);
}
.admin-tab {
  padding: 12px 28px;
  border: none;
  background: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color .15s, border-color .15s;
}
.admin-tab:hover { color: var(--black); }
.admin-tab.active { color: var(--red); border-bottom-color: var(--red); }
</style>
</head>
<body class="admin-body">

<div id="loginScreen" class="admin-login">
  <div class="admin-login-box">
    <h1>Acceso Administrador</h1>
    <input type="password" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Ingresar</button>
    <p id="loginError" class="admin-login-error"></p>
  </div>
</div>

<div id="adminPanel" class="admin-panel" style="display:none">
  <div class="admin-topbar">
    <h2>Panel de Administración</h2>
    <button class="admin-btn admin-btn-outline" onclick="adminLogout()">Cerrar sesión</button>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('productos')">Productos</button>
    <button class="admin-tab" onclick="switchTab('configuracion')">Configuración</button>
  </div>

  <div id="sectionProductos">
    <div class="admin-toolbar">
      <button class="admin-btn admin-btn-primary" onclick="showAddForm()">+ Agregar producto</button>
      <button class="admin-btn admin-btn-outline" onclick="exportJSON()">Exportar JSON</button>
      <button class="admin-btn admin-btn-outline" onclick="document.getElementById('importInput').click()">Importar JSON</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
      <input type="text" id="adminSearch" class="admin-search-input" placeholder="Buscar producto..." oninput="renderAdminTable()">
    </div>

    <div id="addForm" class="admin-form" style="display:none">
      <h3>Nuevo producto</h3>
      <input type="text" id="addName" placeholder="Nombre del producto">
      <select id="addCat"></select>
      <div class="admin-form-field">
        <label>Imagen</label>
        <input type="file" id="addImg" accept="image/*" onchange="previewAddImg(event)">
        <img id="addImgPreview" class="admin-img-preview" style="display:none">
      </div>
      <div class="admin-form-field">
        <label>Descripción</label>
        <textarea id="addDesc" class="admin-textarea" placeholder="Descripción del producto..." rows="3"></textarea>
      </div>
      <div class="admin-form-actions">
        <button class="admin-btn admin-btn-primary" onclick="addProduct()">Guardar</button>
        <button class="admin-btn admin-btn-outline" onclick="hideAddForm()">Cancelar</button>
      </div>
    </div>

    <div id="detailOverlay" class="admin-overlay" style="display:none" onclick="if(event.target===this)hideDetailModal()">
      <div class="admin-modal">
        <h3>Detalle del producto</h3>
        <div class="admin-form-field">
          <label>Nombre</label>
          <input type="text" id="detailName" placeholder="Nombre del producto">
        </div>
        <div class="admin-form-field">
          <label>Categoría</label>
          <select id="detailCat"></select>
        </div>
        <div class="admin-form-field">
          <label>Imagen</label>
          <input type="file" id="detailImg" accept="image/*" onchange="previewDetailImg(event)">
          <img id="detailImgPreview" class="admin-img-preview" style="display:none">
        </div>
        <div class="admin-form-field">
          <label>Descripción</label>
          <textarea id="detailDesc" class="admin-textarea" placeholder="Descripción del producto..." rows="4"></textarea>
        </div>
        <div class="admin-form-actions">
          <button class="admin-btn admin-btn-primary" id="detailSaveBtn">Guardar</button>
          <button class="admin-btn admin-btn-outline" onclick="hideDetailModal()">Cancelar</button>
        </div>
      </div>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table" id="adminTable">
        <thead>
          <tr>
            <th style="width:60px">Imagen</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th style="width:140px">Acciones</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="sectionConfiguracion" style="display:none">
    <div class="admin-form" style="max-width:560px">
      <h3>Configuración general</h3>
      <div class="admin-form-field">
        <label>Número de WhatsApp</label>
        <p style="font-size:13px;color:var(--gray);margin-bottom:8px">Código de país + número, sin + ni espacios. Ej: 5492216746874</p>
        <input type="text" id="configWhatsapp" placeholder="ej: 5492216746874">
      </div>
      <div class="admin-form-actions">
        <button class="admin-btn admin-btn-primary" onclick="saveConfig()">Guardar</button>
      </div>
      <div id="configFeedback" style="font-size:13px;margin-top:8px;color:var(--red);min-height:20px"></div>
    </div>
  </div>
</div>

<script src="../assets/js/productos.js"></script>
<script src="../assets/js/config.js"></script>
<script>
var ADMIN_PASSWORD = 'segulap2024';
var db = [];

function initDB() {
  var stored = localStorage.getItem('segulap_productos');
  if (stored) {
    try { db = JSON.parse(stored); } catch(e) { db = JSON.parse(JSON.stringify(productosData)); }
  } else {
    db = JSON.parse(JSON.stringify(productosData));
    saveDB();
  }
}

function saveDB() {
  localStorage.setItem('segulap_productos', JSON.stringify(db));
}

function setSession() {
  var expiry = new Date();
  expiry.setHours(23, 59, 59, 999);
  localStorage.setItem('segulap_admin_session', expiry.getTime());
}

function clearSession() {
  localStorage.removeItem('segulap_admin_session');
}

function sessionValid() {
  var stored = localStorage.getItem('segulap_admin_session');
  if (!stored) return false;
  return Date.now() < parseInt(stored, 10);
}

function switchTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('sectionProductos').style.display = 'none';
  document.getElementById('sectionConfiguracion').style.display = 'none';
  if (tab === 'productos') {
    document.querySelector('.admin-tab').classList.add('active');
    document.getElementById('sectionProductos').style.display = 'block';
    renderAdminTable();
  } else {
    document.querySelectorAll('.admin-tab')[1].classList.add('active');
    document.getElementById('sectionConfiguracion').style.display = 'block';
    document.getElementById('configWhatsapp').value = getWhatsAppNumber();
  }
}

function showAdminPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  switchTab('productos');
}

function initSession() {
  if (sessionValid()) {
    showAdminPanel();
  }
}

function adminLogin() {
  var pass = document.getElementById('loginPass').value;
  if (pass === ADMIN_PASSWORD) {
    setSession();
    showAdminPanel();
    document.getElementById('loginError').textContent = '';
  } else {
    document.getElementById('loginError').textContent = 'Contraseña incorrecta';
  }
}

function adminLogout() {
  clearSession();
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

function imgCell(p) {
  if (p.img) {
    return '<img src="' + p.img + '" class="admin-table-img">';
  }
  return '<div class="admin-table-img-placeholder"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
}

var adminSearchQuery = '';
var detailIdx = -1;

function renderAdminTable() {
  var tbody = document.getElementById('adminTableBody');
  var q = document.getElementById('adminSearch').value.toLowerCase().trim();
  adminSearchQuery = q;
  var html = '';
  db.forEach(function(p, i) {
    if (q && p.name.toLowerCase().indexOf(q) === -1 && p.cat.toLowerCase().indexOf(q) === -1) return;
    html += '<tr>' +
      '<td>' + imgCell(p) + '</td>' +
      '<td class="admin-name-cell" data-idx="' + i + '" onclick="showDetailModal(' + i + ')">' + p.name + '</td>' +
      '<td class="admin-cat-cell" data-idx="' + i + '">' + p.cat + '</td>' +
      '<td>' +
        '<button class="admin-btn-sm admin-btn-edit" onclick="showDetailModal(' + i + ')">Detalle</button> ' +
        '<button class="admin-btn-sm admin-btn-del" onclick="deleteProduct(' + i + ')">Eliminar</button>' +
      '</td>' +
    '</tr>';
  });
  tbody.innerHTML = html;
}

function populateCatSelect(selId, selected) {
  var sel = document.getElementById(selId);
  sel.innerHTML = '';
  categories.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    if (c === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

function previewAddImg(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var prev = document.getElementById('addImgPreview');
    prev.src = ev.target.result;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function showAddForm() {
  document.getElementById('addForm').style.display = 'block';
  document.getElementById('addName').value = '';
  document.getElementById('addDesc').value = '';
  document.getElementById('addImg').value = '';
  document.getElementById('addImgPreview').style.display = 'none';
  populateCatSelect('addCat', categories[0]);
  document.getElementById('addName').focus();
}

function hideAddForm() {
  document.getElementById('addForm').style.display = 'none';
}

function addProduct() {
  var name = document.getElementById('addName').value.trim();
  if (!name) return;
  var cat = document.getElementById('addCat').value;
  var desc = document.getElementById('addDesc').value.trim();
  var img = document.getElementById('addImgPreview').src;
  var product = { name: name, cat: cat, desc: desc };
  if (img && img.startsWith('data:')) {
    product.img = img;
  }
  db.push(product);
  saveDB();
  hideAddForm();
  renderAdminTable();
}

function showDetailModal(idx) {
  detailIdx = idx;
  var p = db[idx];
  document.getElementById('detailName').value = p.name || '';
  document.getElementById('detailDesc').value = p.desc || '';
  populateCatSelect('detailCat', p.cat || categories[0]);
  var prev = document.getElementById('detailImgPreview');
  if (p.img) {
    prev.src = p.img;
    prev.style.display = 'block';
  } else {
    prev.style.display = 'none';
  }
  document.getElementById('detailImg').value = '';
  var saveBtn = document.getElementById('detailSaveBtn');
  saveBtn.onclick = function() { saveDetailModal(); };
  document.getElementById('detailOverlay').style.display = 'flex';
}

function hideDetailModal() {
  document.getElementById('detailOverlay').style.display = 'none';
}

function previewDetailImg(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var prev = document.getElementById('detailImgPreview');
    prev.src = ev.target.result;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveDetailModal() {
  var name = document.getElementById('detailName').value.trim();
  if (!name) return;
  var cat = document.getElementById('detailCat').value;
  var desc = document.getElementById('detailDesc').value.trim();
  var prev = document.getElementById('detailImgPreview');
  db[detailIdx].name = name;
  db[detailIdx].cat = cat;
  db[detailIdx].desc = desc;
  if (prev.style.display !== 'none' && prev.src) {
    db[detailIdx].img = prev.src;
  }
  saveDB();
  hideDetailModal();
  renderAdminTable();
}

function deleteProduct(idx) {
  if (!confirm('¿Eliminar "' + db[idx].name + '"?')) return;
  db.splice(idx, 1);
  saveDB();
  renderAdminTable();
}

function exportJSON() {
  var blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'productos.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Formato inválido');
      db = data;
      saveDB();
      renderAdminTable();
      alert('Importados ' + db.length + ' productos.');
    } catch(err) {
      alert('Error al importar: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function saveConfig() {
  var num = document.getElementById('configWhatsapp').value.trim();
  var fb = document.getElementById('configFeedback');
  if (!num) { fb.textContent = 'Ingresá un número válido.'; return; }
  setWhatsAppNumber(num);
  fb.textContent = 'Número guardado correctamente.';
  fb.style.color = '#2e7d32';
}

populateCatSelect('addCat', categories[0]);
initDB();
initSession();
</script>
</body>
</html>
