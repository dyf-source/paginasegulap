   <script>
    function getFormData() {
      var nombre = document.getElementById('nombre').value.trim();
      var email = document.getElementById('email').value.trim();
      var asunto = document.getElementById('asunto').value.trim();
      var mensaje = document.getElementById('mensaje').value.trim();
      if (!nombre || !email || !asunto || !mensaje) {
       alert('Por favor completá todos los campos obligatorios.');
       return null;
      }
      return { nombre: nombre, email: email, asunto: asunto, mensaje: mensaje };
     }
     function enviarEmail() {
      var d = getFormData();
      if (!d) return;
      var cuerpo = 'Nombre: ' + d.nombre + '%0D%0A';
      cuerpo += 'Email: ' + d.email + '%0D%0A';
      cuerpo += 'Asunto: ' + d.asunto + '%0D%0A%0D%0A';
      cuerpo += d.mensaje;
      window.location.href = 'mailto:segulap@example.com?subject=' + encodeURIComponent(d.asunto) + '&body=' + cuerpo;
     }
     function enviarWhatsApp() {
      var d = getFormData();
      if (!d) return;
      var texto = 'Hola, soy ' + d.nombre + '.%0A%0A';
      texto += d.mensaje;
      window.open('https://wa.me/5492216746874?text=' + texto, '_blank');
     }
   </script>
